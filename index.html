<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 트래블 아카이브 ✈️</title>
    <style>
        :root {
            --primary-color: #2a6fdb;
            --secondary-color: #f1f5f9;
            --accent-color: #ff4d4d;
            --text-color: #1e293b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --edit-color: #eab308;
            --wish-color: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 16px; padding-bottom: 40px; }
        header { text-align: center; padding: 20px 0 10px 0; }
        header h1 { font-size: 24px; font-weight: 800; color: #0f172a; }
        
        .section { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; color: #334155; display: flex; align-items: center; gap: 6px; }
        
        /* 여행 리스트 스타일 */
        .travel-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--secondary-color); border-radius: 12px; margin-bottom: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .travel-item:hover { background: #e2e8f0; }
        .travel-item.active { background: var(--primary-color); color: white; }
        .btn-delete-travel { background: none; border: none; color: var(--accent-color); font-weight: bold; cursor: pointer; font-size: 14px; }

        /* 입력 폼 스타일 */
        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        input, textarea, select { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; outline: none; background: white; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary-color); }
        
        /* 버튼 스타일 */
        button { border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-main { background: var(--primary-color); color: white; padding: 12px 20px; font-size: 14px; }
        .btn-main:hover { background: #1d5bbf; }
        .btn-diary-go { background: #4f46e5; color: white; width: 100%; padding: 16px; font-size: 16px; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .btn-diary-go:hover { background: #4338ca; }
        .btn-back { background: #64748b; color: white; padding: 8px 14px; font-size: 14px; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 4px; }

        /* 일기 아이템 스타일 */
        .diary-item { background: var(--secondary-color); border-radius: 12px; padding: 16px; margin-bottom: 12px; position: relative; }
        .diary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; }
        .diary-date { font-weight: 700; color: var(--primary-color); font-size: 14px; }
        .diary-actions { display: flex; gap: 8px; }
        .btn-edit { color: var(--edit-color); background: none; font-size: 13px; }
        .btn-del { color: var(--accent-color); background: none; font-size: 13px; }
        .diary-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: #334155; }

        /* 화면 전환용 공통 스타일 */
        .hidden { display: none !important; }
        .empty-msg { text-align: center; color: #94a3b8; padding: 20px 0; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1>스마트 트래블 아카이브 ✈️</h1>
    </header>

    <div id="screen-main">
        <div class="section">
            <div class="section-title">🗺️ 나의 여행 리스트</div>
            <div id="travel-list"></div>
            
            <div class="input-group" style="margin-top: 16px;">
                <input type="text" id="input-travel-title" placeholder="새로운 여행지 입력 (예: 도쿄 여행, 부산 호캉스)">
                <button class="btn-main" onclick="addTravel()">추가</button>
            </div>
        </div>

        <button class="btn-diary-go" onclick="goToDiaryScreen()">
            📝 선택한 여행 일기장 열기
        </button>
    </div>

    <div id="screen-diary" class="hidden">
        <button class="btn-back" onclick="goToMainScreen()">⬅️ 메인으로</button>
        
        <div class="section">
            <div class="section-title">📂 여행 선택</div>
            <select id="select-travel-diary" onchange="changeDiaryTarget()"></select>
        </div>

        <div class="section">
            <div class="section-title">✍️ 새로운 일기 쓰기</div>
            <div class="input-group" style="flex-direction: column;">
                <input type="date" id="input-diary-date" style="width: 100%;">
                <textarea id="input-diary-text" rows="3" placeholder="오늘의 추억을 기록해보세요..."></textarea>
                <button class="btn-main" onclick="addDiary()" style="width: 100%;">일기 저장하기</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">📅 기록된 일기 (날짜순)</div>
            <div id="diary-list"></div>
        </div>
    </div>

    <script>
        // 데이터 구조 초기화 및 로드
        let appData = {
            travels: [],
            activeTravelId: null
        };

        function loadData() {
            const saved = localStorage.getItem('smart_travel_archive');
            if (saved) {
                try {
                    appData = JSON.parse(saved);
                } catch(e) {
                    initDefaultData();
                }
            } else {
                initDefaultData();
            }
        }

        function initDefaultData() {
            appData = {
                travels: [
                    { id: 1710000000000, title: "💡 예시) 첫 번째 여행", diaries: [
                        { id: 1, date: "2026-05-28", text: "여기에 여행 일기가 기록됩니다! 수정과 삭제를 테스트해보세요." }
                    ]}
                ],
                activeTravelId: 1710000000000
            };
            saveData();
        }

        function saveData() {
            localStorage.setItem('smart_travel_archive', JSON.stringify(appData));
        }

        // 현재 활성화된 여행 오브젝트 가져오기
        function getActiveTravel() {
            return appData.travels.find(t => t.id === appData.activeTravelId) || appData.travels[0];
        }

        // 메인 화면 렌더링
        function renderMainScreen() {
            const container = document.getElementById('travel-list');
            container.innerHTML = '';

            if (appData.travels.length === 0) {
                container.innerHTML = '<div class="empty-msg">등록된 여행이 없습니다. 여행지를 추가해주세요!</div>';
                return;
            }

            appData.travels.forEach(travel => {
                const div = document.createElement('div');
                div.className = `travel-item ${travel.id === appData.activeTravelId ? 'active' : ''}`;
                div.onclick = () => selectTravel(travel.id);
                
                div.innerHTML = `
                    <span>📍 ${travel.title}</span>
                    <button class="btn-delete-travel" onclick="deleteTravel(event, ${travel.id})">삭제</button>
                `;
                container.appendChild(div);
            });
        }

        // 여행지 선택 함수
        function selectTravel(id) {
            appData.activeTravelId = id;
            saveData();
            renderMainScreen();
        }

        // 여행지 추가 함수
        function addTravel() {
            const input = document.getElementById('input-travel-title');
            const title = input.value.trim();
            if (!title) return alert('여행지 이름을 입력해주세요.');

            const newTravel = {
                id: Date.now(),
                title: title,
                diaries: []
            };

            appData.travels.push(newTravel);
            appData.activeTravelId = newTravel.id; // 새로 만든 여행을 바로 선택
            input.value = '';
            saveData();
            renderMainScreen();
        }

        // 여행지 삭제 함수
        function deleteTravel(event, id) {
            event.stopPropagation(); // 부모 클릭 이벤트 방지
            if (confirm('이 여행지와 해당 여행의 모든 일기가 영구 삭제됩니다. 정말 삭제하시겠습니까?')) {
                appData.travels = appData.travels.filter(t => t.id !== id);
                if (appData.activeTravelId === id && appData.travels.length > 0) {
                    appData.activeTravelId = appData.travels[0].id;
                } else if (appData.travels.length === 0) {
                    appData.activeTravelId = null;
                }
                saveData();
                renderMainScreen();
            }
        }

        // 일기 화면 전송 및 셀렉트 박스 동기화
        function goToDiaryScreen() {
            if (!appData.activeTravelId) {
                alert('선택되거나 등록된 여행지가 없습니다. 먼저 여행지를 추가해주세요.');
                return;
            }
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-diary').classList.remove('hidden');

            // 오늘 날짜 기본 세팅
            document.getElementById('input-diary-date').value = new Date().toISOString().substring(0, 10);

            renderDiarySelectOptions();
            renderDiaries();
        }

        function goToMainScreen() {
            document.getElementById('screen-diary').classList.add('hidden');
            document.getElementById('screen-main').classList.remove('hidden');
            renderMainScreen();
        }

        // 일기 화면 내 여행 선택 드롭다운 설정
        function renderDiarySelectOptions() {
            const select = document.getElementById('select-travel-diary');
            select.innerHTML = '';
            appData.travels.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = `📍 ${t.title}`;
                if (t.id === appData.activeTravelId) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function changeDiaryTarget() {
            const select = document.getElementById('select-travel-diary');
            appData.activeTravelId = Number(select.value);
            saveData();
            renderDiaries();
        }

        // 일기 목록 렌더링 (날짜 오름차순/순서대로 정렬)
        function renderDiaries() {
            const container = document.getElementById('diary-list');
            container.innerHTML = '';
            
            const currentTravel = getActiveTravel();
            if (!currentTravel) return;

            // 날짜 순서대로 정렬 (오래된 순 -> 최신 순 정렬: localeCompare)
            // 만약 최신순을 원하시면 b.date.localeCompare(a.date)로 변경 가능합니다.
            const sortedDiaries = [...currentTravel.diaries].sort((a, b) => a.date.localeCompare(b.date));

            if (sortedDiaries.length === 0) {
                container.innerHTML = '<div class="empty-msg">아직 기록된 일기가 없습니다. 첫 추억을 남겨보세요!</div>';
                return;
            }

            sortedDiaries.forEach(diary => {
                const div = document.createElement('div');
                div.className = 'diary-item';
                div.innerHTML = `
                    <div class="diary-header">
                        <div class="diary-date">📅 ${diary.date}</div>
                        <div class="diary-actions">
                            <button class="btn-edit" onclick="showEditDiaryForm(${diary.id})">수정</button>
                            <button class="btn-del" onclick="deleteDiary(${diary.id})">삭제</button>
                        </div>
                    </div>
                    <div class="diary-text" id="diary-text-box-${diary.id}">${diary.text}</div>
                `;
                container.appendChild(div);
            });
        }

        // 일기 추가 함수
        function addDiary() {
            const dateInput = document.getElementById('input-diary-date');
            const textInput = document.getElementById('input-diary-text');
            
            const date = dateInput.value;
            const text = textInput.value.trim();

            if (!date) return alert('날짜를 선택해주세요.');
            if (!text) return alert('내용을 입력해주세요.');

            const currentTravel = getActiveTravel();
            currentTravel.diaries.push({
                id: Date.now(),
                date: date,
                text: text
            });

            textInput.value = '';
            saveData();
            renderDiaries();
        }

        // 일기 수정 폼 전환
        function showEditDiaryForm(id) {
            const currentTravel = getActiveTravel();
            const diary = currentTravel.diaries.find(d => d.id === id);
            const textBox = document.getElementById(`diary-text-box-${id}`);

            textBox.innerHTML = `
                <textarea id="edit-textarea-${id}" rows="3" style="width:100%; margin-top:6px;">${diary.text}</textarea>
                <div style="display:flex; gap:6px; margin-top:6px; justify-content: flex-end;">
                    <button class="btn-main" onclick="saveEditedDiary(${id})" style="padding:6px 12px; font-size:12px;">저장</button>
                    <button class="btn-back" onclick="renderDiaries()" style="padding:6px 12px; font-size:12px; margin:0;">취소</button>
                </div>
            `;
        }

        // 일기 수정 완료 저장
        function saveEditedDiary(id) {
            const currentTravel = getActiveTravel();
            const diary = currentTravel.diaries.find(d => d.id === id);
            const newText = document.getElementById(`edit-textarea-${id}`).value.trim();

            if (!newText) return alert('내용을 입력해주세요.');

            diary.text = newText;
            saveData();
            renderDiaries();
        }

        // 일기 삭제 함수 (confirm 창으로 말리는 기능 포함)
        function deleteDiary(id) {
            if (confirm('이 일기를 정말 삭제할까요?')) {
                const currentTravel = getActiveTravel();
                currentTravel.diaries = currentTravel.diaries.filter(d => d.id !== id);
                saveData();
                renderDiaries();
            }
        }

        // 최초 실행시 초기화
        window.onload = function() {
            loadData();
            renderMainScreen();
        };
    </script>
</body>
</html>
